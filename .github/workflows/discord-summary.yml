name: Discord Summary

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  discord-summary:
    name: Send Reboot Outreach summary
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Discord payload
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO_NAME: ${{ github.repository }}
          ACTOR_NAME: ${{ github.actor }}
          REF_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "::warning::DISCORD_WEBHOOK_URL secret is not set. Skipping Discord send."
            echo '{"content":"DISCORD_WEBHOOK_URL secret is not set."}' > discord_payload.json
            exit 0
          fi

          python - <<'PY'
          import json
          import os
          import pathlib
          import subprocess

          def read_excerpt(path: str, limit: int) -> str:
              file_path = pathlib.Path(path)
              if not file_path.exists():
                  return f"Missing: {path}"
              text = file_path.read_text(encoding="utf-8", errors="replace").strip()
              if len(text) > limit:
                  return text[:limit].rstrip() + "\n..."
              return text or f"Empty: {path}"

          def git_subject() -> str:
              try:
                  return subprocess.check_output(
                      ["git", "log", "-1", "--pretty=%s"],
                      text=True,
                  ).strip()
              except Exception:
                  return "Unknown commit subject"

          repo = os.environ.get("REPO_NAME", "unknown repo")
          actor = os.environ.get("ACTOR_NAME", "unknown actor")
          ref = os.environ.get("REF_NAME", "unknown ref")
          sha = os.environ.get("COMMIT_SHA", "")[:7]
          run_url = os.environ.get("RUN_URL", "")

          pointer = read_excerpt(".agent/pointer.md", 700)
          output = read_excerpt(".agent/output.md", 900)
          memory = read_excerpt("docs/REBOOT_OUTREACH_MEMORY.md", 1000)

          payload = {
              "username": "Reboot Outreach Agent",
              "content": f"Reboot Outreach summary for `{repo}` on `{ref}` by `{actor}`.",
              "embeds": [
                  {
                      "title": "Reboot Outreach Update",
                      "description": f"Commit `{sha}` — {git_subject()}",
                      "url": run_url,
                      "fields": [
                          {
                              "name": "Pointer",
                              "value": pointer[:1024],
                              "inline": False,
                          },
                          {
                              "name": "Latest Output",
                              "value": output[:1024],
                              "inline": False,
                          },
                          {
                              "name": "Memory Snapshot",
                              "value": memory[:1024],
                              "inline": False,
                          },
                      ],
                  }
              ],
          }

          pathlib.Path("discord_payload.json").write_text(
              json.dumps(payload, ensure_ascii=False),
              encoding="utf-8",
          )
          PY

      - name: Send Discord summary
        if: ${{ env.DISCORD_WEBHOOK_URL != '' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl --fail-with-body \
            -H "Content-Type: application/json" \
            --data @discord_payload.json \
            "$DISCORD_WEBHOOK_URL"
